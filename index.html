<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Raíz Cuadrada</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
    background:#f4f4f4;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    margin:auto;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    padding:10px;
    width:80%;
    margin:10px;
}

button{
    padding:10px 20px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.resultado{
    margin-top:15px;
    font-size:18px;
}
</style>

</head>
<body>

<div class="container">

<h2>Calculadora de Raíz Cuadrada</h2>

<input type="number" id="numero" placeholder="Ingresa un número">

<br>

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
